services:
  - type: web
    name: forest-calculation-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r forest_public_app/backend/requirements.txt
    startCommand: uvicorn forest_public_app.backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: CORS_ORIGINS
        value: "*"
